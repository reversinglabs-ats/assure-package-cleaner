openapi: 3.0.3
info:
  title: ReversingLabs Spectra Assure Portal API
  version: '1.0'
  contact:
    name: ReversingLabs Support
    url: https://www.reversinglabs.com/
    email: support@reversinglabs.com
  license:
    name: Proprietary
    url: https://www.reversinglabs.com/hubfs/ReversingLabs_MLSA.pdf
  description:
    $ref: ./_intro.md
servers:
  - url: https://{portalUrl}/api/public/v1
    variables:
      portalUrl:
        description: URL of the Portal instance that you want to access from the API. By default, the Portal instance will be a subdirectory of `my.secure.software`. Depending on your region, replace `my` with one of the following - `ca` (for Canada), `us` (for USA; interchangeable with `my`).
        default: my.secure.software/example
        enum:
          - my.secure.software/example
          - ca.secure.software/example
          - us.secure.software/example
security:
  - TokenAuthentication: []
tags:
  - name: Version
    description: '**Endpoints in this category help you work with software package versions in your Portal projects.**'
  - name: Project
    description: '**Endpoints in this category help you manage your projects in the Portal.**'
  - name: Package
    description: '**Endpoints in this category help you manage software packages in your Portal projects.**'
  - name: Group
    description: '**Endpoints in this category make it easier to work with groups in the Portal.**'
  - name: Approval
    description: |-
      **Endpoints in this category help you manage the approval status for software package versions in the Portal.**

      The following table explains which approval flows are supported by these API endpoints.

      | Approval flow | API | Details |
      | --------- | :---: | ---- |
      | Approval Pending -> Approved  | ✔️ | By default, all package versions await approval and can be approved. |
      | Approval Pending -> Rejected | ✔️ | By default, all package versions await approval and can be rejected. |
      | Approval Pending -> Revoked | ❌ | There is nothing to revoke if the package version has not been approved yet. |
      | Approved -> Revoked | ✔️ | A previously approved package version can have its approval status revoked. |
      | Approved -> Rejected | ❌ | Contradictory action; use the revoke option instead. |
      | Approved -> Approval Pending | ❌ | Approval status cannot be reset to the initial (undetermined) state. |
      | Rejected -> Approved | ✔️ | A previously rejected package version can be approved. |
      | Rejected -> Revoked | ❌ | There is nothing to revoke if the package version is not approved. |
      | Rejected -> Approval Pending | ❌ | Approval status cannot be reset to the initial (undetermined) state. |
      | Revoked -> Approved | ❌ | Revoked package versions cannot be approved again. |
      | Revoked -> Rejected | ❌ | Revoked package versions cannot be rejected. |
      | Revoked -> Approval Pending | ❌ | Approval status cannot be reset to the initial (undetermined) state. |
  - name: Community
    description: |-
      **Endpoints in this category let you interact with Spectra Assure Community.**

      ReversingLabs [Spectra Assure Community](https://docs.secure.software/community/) is a free-to-use SaaS platform where software developers, DevOps engineers, and IT security specialists can check the security status of widely distributed developer tools and open source software packages from the most popular communities. The contents of these software package and developer tool repositories are continually analyzed by ReversingLabs with the latest findings immediately available on the Spectra Assure Community website.

      The Spectra Assure Community API is an extension of the Community platform and a companion solution to the free SaaS tool.
      It allows you to automate common actions; specifically, searching for packages and retrieving information about individual software packages and their versions.

      These endpoints are also available to Spectra Intelligence customers as part of the [TCA-0701 API](https://docs.reversinglabs.com/SpectraIntelligence/API-reference/#tag/Supply-Chain-Security).
  - name: Profile
    description: |-
      **Endpoints in this category help you manage organization and group profile configurations.**

      With reusable profile configurations, users can preserve organization and group settings and reuse them across multiple Spectra Assure products. This ensures consistency across products and automatically applies any predefined customizations, reducing the risk of configuration errors and discrepancies.

paths:
  /scan/{organization}/{group}/pkg:rl/{project}/{package}@{version}:
    parameters:
      - $ref: "#/components/parameters/organization"
      - $ref: "#/components/parameters/group"
      - $ref: "#/components/parameters/project"
      - $ref: "#/components/parameters/package"
      - $ref: "#/components/parameters/version"
      - $ref: "#/components/parameters/build"
      - in: query
        name: replace
        required: false
        description: |-
          This optional parameter lets you replace (overwrite) an already existing package version in the project with the package version you're uploading. This functionality is equivalent to the `--replace` option in the `rl-secure scan` command.

          If this parameter is omitted or set to **false** and the package version you're trying to upload already exists in the specified project, the API returns the 409 error response.
        schema:
          type: boolean
          default: false
      - in: query
        name: force
        required: false
        description: |-
          In the Portal, a package can only have a limited amount of versions. If a package already has the maximum number of versions, you can use this optional parameter to specify if the oldest version of the package should be deleted to make space for the version you're uploading.

          If this parameter is omitted or set to **false** and the package already has the maximum allowed number of versions, the API returns the 400 error response.

          This parameter is incompatible with `build=repro`.
        schema:
          type: boolean
          default: false
      - in: query
        name: diff_with
        required: false
        description: |-
          This optional parameter lets you specify a previous package version against which you want to compare (diff) the version you're uploading. The specified version must exist in the package. This functionality is equivalent to the `--diff-with` option in the `rl-secure report` command.

          This parameter is incompatible with `build=repro`.
        schema:
          type: string
          example: 1.1.0
          description: Name of the package version that will be compared to the version you're uploading. This version is treated as the predecessor and displayed in the diff section of the report as the 'Referential File'.
      - in: query
        name: product
        required: false
        schema:
          $ref: "#/components/schemas/VersionMetadataProduct"
      - in: query
        name: publisher
        required: false
        schema:
          $ref: "#/components/schemas/VersionMetadataPublisher"
      - in: query
        name: category
        required: false
        schema:
          allOf:
            - $ref: "#/components/schemas/SoftwareCategory"
            - default: Other
      - in: query
        name: license
        required: false
        schema:
          allOf:
            - $ref: "#/components/schemas/SoftwareLicense"
            - default: Unknown
      - in: query
        name: platform
        required: false
        schema:
          allOf:
            - $ref: "#/components/schemas/SoftwarePlatform"
            - default: Other
      - in: query
        name: release_date
        required: false
        schema:
          allOf:
            - $ref: "#/components/schemas/DateTime"
            - description: Date and time to set and display as the release date for the software package version in the Portal. When this parameter is omitted from the request, the version is considered unreleased. You can change the release status at any time directly through the Portal interface or through the API with the **Modify a version** endpoint.
      - in: header
        name: Content-Disposition
        required: true
        description: Specify the name of the uploaded file preceded by the `attachment` parameter. This file name will be visible in the analysis reports.
        schema:
          type: string
          example: "attachment; filename=upload.exe"
      - in: header
        name: Content-Length
        required: true
        description: Specify the size of the uploaded file in bytes. If the filesize is larger than the available quota, the API returns the 402 error response.
        schema:
          type: string
          example: "524288"
    post:
      operationId: scanVersion
      summary: Upload and scan a version
      description: |-
        Scan a file and add it as a new package version to a project in the Portal. If the project or package specified in the request don't exist in the Portal, they will be automatically created.

        For a file to be successfully uploaded and analyzed on the Portal, your group must have enough available [analysis capacity](https://docs.secure.software/portal/analysis-capacity). The file size you want to upload must not exceed any configured group limits.

        If the package version specified in the request already exists in the package, the API returns the 409 error response. You can repeat the request with the `replace` parameter in the query to overwrite the existing version.

        To add a reproducible build artifact to an existing package version, use the `build` query parameter set to the `repro` value (`?build=repro`). If a reproducible build artifact already exists for a package version, the API returns a 400 error response. In this case, you should repeat the request with the `replace` query parameter set to `true`.

        Only one file (main package version artifact or reproducible build artifact) can be uploaded per request.
      tags:
        - Version
      x-codeSamples:
        - lang: bash
          label: 'Shell'
          source:
            $ref: './code-samples/curl/scanVersion'
        - lang: python
          label: 'Python - Requests'
          source:
            $ref: './code-samples/python/scanVersion'
        - lang: javascript
          label: 'NodeJS - Request'
          source:
            $ref: './code-samples/node/scanVersion'
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
              description: File to be uploaded to the Portal.
      responses:
        '201':
          description: Created
          content:
            text/plain:
              example: 'Created'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                MaxNumberOfVersionsInPackage:
                  value:
                    error: Package has reached maximum number of versions
                ReplaceVersionWithExistingDescendants:
                  value:
                    error: Cannot replace version with existing descendants
                InvalidPreviousVersion:
                  value:
                    error: Invalid previous version
                NoOrganization:
                  value:
                    error: Organization with provided reference does not exist
                NoGroup:
                  value:
                    error: Group with provided reference does not exist
                UnsupportedCharacter:
                  value:
                    error: Resource name contains one or more of the following forbidden characters \/:*?"<>|
        '401':
          $ref: '#/components/responses/Unauthorized'
        '402':
          $ref: '#/components/responses/InsufficientRemainingCapacity'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Version already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/ServerError'

  /url-import/{organization}/{group}/pkg:rl/{project}/{package}@{version}:
    parameters:
      - $ref: "#/components/parameters/organization"
      - $ref: "#/components/parameters/group"
      - $ref: "#/components/parameters/project"
      - $ref: "#/components/parameters/package"
      - $ref: "#/components/parameters/version"
      - in: query
        name: max_size
        required: false
        schema:
          type: integer
          description: "The maximum file size that the Portal will attempt to download from the specified URL, in bytes. Keep in mind that the file size estimate before the download starts can be unreliable."
      - in: query
        name: replace
        required: false
        description: "This optional parameter lets you replace (overwrite) an already existing package version in the project with the package version you're uploading. This functionality is equivalent to the `--replace` option in the `rl-secure scan` command. If this parameter is set to **false** and the package version you're trying to upload already exists in the specified project, the API returns the 409 error response."
        schema:
          type: boolean
          default: false
      - in: query
        name: force
        required: false
        description: "In the Portal, a package can only have a limited amount of versions. If a package already has the maximum number of versions, you can use this optional parameter to specify if the oldest version of the package should be deleted to make space for the version you're uploading. If this parameter is set to **false** and the package already has the maximum allowed number of versions, the API returns the 400 error response."
        schema:
          type: boolean
          default: false
      - in: query
        name: diff_with
        required: false
        description: "This optional parameter lets you specify a previous package version against which you want to compare (diff) the version you're uploading. The specified version must exist in the package. This functionality is equivalent to the `--diff-with` option in the `rl-secure report` command."
        schema:
          type: string
          example: 1.1.0
          description: "Name of the package version that will be compared to the version you're uploading. This version is treated as the predecessor and displayed in the diff section of the report as the 'Referential File'."
      - in: query
        name: product
        required: false
        schema:
          $ref: "#/components/schemas/VersionMetadataProduct"
      - in: query
        name: publisher
        required: false
        schema:
          $ref: "#/components/schemas/VersionMetadataPublisher"
      - in: query
        name: category
        required: false
        schema:
          allOf:
            - $ref: "#/components/schemas/SoftwareCategory"
            - default: Other
      - in: query
        name: license
        required: false
        schema:
          allOf:
            - $ref: "#/components/schemas/SoftwareLicense"
            - default: Unknown
      - in: query
        name: platform
        required: false
        schema:
          allOf:
            - $ref: "#/components/schemas/SoftwarePlatform"
            - default: Other
      - in: query
        name: release_date
        required: false
        schema:
          $ref: "#/components/schemas/DateTime"

    post:
      operationId: importVersion
      summary: Import a version from URL
      description: |-
        Specify a URL from which to download a file and import it as a new package version into the Portal. If the project or package specified in the request don't exist in the Portal, they will be automatically created.

        Only one package version can be imported per request.

        To successfully import and analyze a file from a URL:

        - check that the file format is supported in the [file format](https://docs.secure.software/concepts/filetypes) and [community/language coverage](https://docs.secure.software/concepts/language-coverage) lists
        - make sure your group has enough available [analysis capacity](https://docs.secure.software/portal/analysis-capacity). The file size you want to import must not exceed any configured group limits. You can use the optional query parameter `max_size` to limit the size of the imported file if necessary

        Only Support, Organization Admin, Group Owner, and Maintainer roles can import a package version.

        If the package version specified in the request already exists in the package, the API returns the 409 error response. You can repeat the request with the `replace` parameter in the query to overwrite the existing version.

        Some servers may require authentication for file downloads from URLs. In that case, you should use either the `auth-user` and `auth-pass` or the `bearer-token` parameters in the request body. Usernames, passwords, and tokens provided through those authentication options are never stored in Spectra Assure products. They are forwarded directly to the service that requests authentication to start the file download.

      tags:
        - Version
      x-codeSamples:
        - lang: bash
          label: 'Shell'
          source:
            $ref: './code-samples/curl/importVersion'
        - lang: python
          label: 'Python - Requests'
          source:
            $ref: './code-samples/python/importVersion'
        - lang: javascript
          label: 'NodeJS - Request'
          source:
            $ref: './code-samples/node/importVersion'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - url
              properties:
                url:
                  type: string
                  description: "The URL from which you want to download and import a software package into the Portal. If the URL is not valid or if there is no downloadable file at the specified location, the import will fail."
                  format: uri
                  maxLength: 4096
                  example: "https://example.com/downloads/example-file.exe"
                auth-user:
                  type: string
                  description: "If authentication is required for downloading the software package from the specified URL, use this parameter to provide the username. Cannot be used with `bearer-token`."
                  example: "username"
                auth-pass:
                  type: string
                  format: password
                  description: "If authentication is required for downloading the software package from the specified URL, use this parameter to provide the password. Cannot be used with `bearer-token`."
                bearer-token:
                  type: string
                  description: "If token-based authentication is required for downloading the software package from the specified URL, use this parameter to provide a Bearer token. Cannot be used with `auth-user` and `auth-pass`."
                  example: "Bearer <token>"

      responses:
        "201":
          description: Created
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                MaxNumberOfVersionsInPackage:
                  value:
                    error: Package has reached the maximum number of versions
                ReplacingVersionWithExistingDescendants:
                  value:
                    error: Cannot replace version with existing descendants
                InvalidPreviousVersion:
                  value:
                    error: Invalid previous version
                MaxFileSizeExceeded:
                  value:
                    error: File size exceeds provided 'max_size'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "402":
          $ref: '#/components/responses/InsufficientRemainingCapacity'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'
        "409":
          description: Version already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          $ref: '#/components/responses/TooManyRequests'
        "500":
          $ref: '#/components/responses/ServerError'

  /sync/{organization}/{group}/pkg:rl/{project}/{package}@{version}:
    parameters:
      - $ref: "#/components/parameters/organization"
      - $ref: "#/components/parameters/group"
      - $ref: "#/components/parameters/project"
      - $ref: "#/components/parameters/package"
      - $ref: "#/components/parameters/version"
    post:
      operationId: syncVersion
      summary: Rescan a version
      description: |-
        Rescans the existing package version to synchronize it with the updated configuration or with the latest engine update. This action is equivalent to the `Reanalyze` action on the Portal.

        Reanalyzing a package version does not count towards the monthly analysis capacity.

        When you request reanalysis from this endpoint, the Portal automatically detects configuration changes or engine updates that would require synchronization. If there haven't been any changes, reanalysis is skipped and the API returns the `200` response. This means you don't need to manually check for configuration changes or engine updates prior to requesting reanalysis.
      tags:
        - Version
      responses:
        '200':
          description: Version already in sync
          content:
            text/plain:
              example: 'Version already in sync'
        '202':
          description: Sync started
          content:
            text/plain:
              example: 'Sync started'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/ServerError'

  /status/{organization}/{group}/pkg:rl/{project}/{package}@{version}:
    parameters:
      - $ref: "#/components/parameters/organization"
      - $ref: "#/components/parameters/group"
      - $ref: "#/components/parameters/project"
      - $ref: "#/components/parameters/package"
      - $ref: "#/components/parameters/version"
      - $ref: "#/components/parameters/build"
      - $ref: "#/components/parameters/download"
    get:
      operationId: getVersionStatus
      summary: Show analysis status
      description: |-
        Check the analysis status of a package version that was previously uploaded to the Portal. If the version has been successfully analyzed, the response includes a summary of the analysis report.

        To retrieve the full analysis report in any of the supported formats, use the **Export analysis report** endpoint.

        By default, this endpoint returns the status of the main (representative) artifact in the version. To check the status of a reproducible build artifact, use the `build` query parameter set to the `repro` value. If a reproducible build artifact doesn't exist for the requested package version, the API returns an error response.

        Note that this endpoint returns the analysis status of the requested file (either the main package version artifact or the reproducible build artifact). It doesn't include details on the checks that were performed during analysis. To view that information, use the **Show performed checks** endpoint.

        Optionally, this endpoint can return a short-lived download link for the main artifact or the reproducible build artifact if the `download` query parameter is used. With the `build` query parameter, specify for which artifact the download link should be generated. If the `build` parameter is omitted from the request, the download link is generated for the main artifact.

        The download link is valid only for 60 seconds, after which it can be requested again. Every time the download link is generated, the Portal Download Capacity is reduced by the artifact's file size, even if the artifact is not downloaded from the link. **To download the artifact, the user account that is sending the request must have the appropriate permissions.** If the user account doesn't have permission to download files from the Portal, the endpoint responds with an error and the Download Capacity remains unaffected.
      tags:
        - Version
      x-codeSamples:
        - lang: bash
          label: 'Shell'
          source:
            $ref: './code-samples/curl/getVersionStatus'
        - lang: python
          label: 'Python - Requests'
          source:
            $ref: './code-samples/python/getVersionStatus'
        - lang: javascript
          label: 'NodeJS - Request'
          source:
            $ref: './code-samples/node/getVersionStatus'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required:
                  - analysis
                properties:
                  analysis:
                    type: object
                    required:
                      - schema
                      - timestamp
                      - version
                      - duration
                      - status
                      - report
                    properties:
                      schema:
                        type: string
                        enum:
                          - '2'
                        nullable: true
                        description: Version of the report schema. Version number is incremented to indicate a break of backwards compatibility.
                      timestamp:
                        type: string
                        format: date-time
                        nullable: true
                        description: Indicates when the software package was last analyzed in ISO-8601 time format.
                      version:
                        type: string
                        example: 5.0.0.0
                        nullable: true
                        description: Version of the analysis engine that was used to inspect the software package.
                      duration:
                        type: string
                        example: '00:07:49.859'
                        nullable: true
                        description: Indicates how long it took to complete the analysis step.
                      status:
                        type: string
                        enum:
                          - PROCESSING
                          - DONE
                          - ERROR
                        example: DONE
                        description: Indicates the analysis status for the requested package version.
                      report:
                        $ref: '#/components/schemas/AnalysisReport'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                VersionDoesntHaveRepro:
                  value:
                    error: Provided version does not have a reproducible build.
                NoOrganization:
                  value:
                    error: Organization with provided reference does not exist
                NoGroup:
                  value:
                    error: Group with provided reference does not exist
                UnsupportedCharacter:
                  value:
                    error: Resource name contains one or more of the following forbidden characters \/:*?"<>|
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/ServerError'
  /checks/{organization}/{group}/pkg:rl/{project}/{package}@{version}:
    parameters:
      - $ref: "#/components/parameters/organization"
      - $ref: "#/components/parameters/group"
      - $ref: "#/components/parameters/project"
      - $ref: "#/components/parameters/package"
      - $ref: "#/components/parameters/version"
    get:
      operationId: getVersionChecks
      summary: Show performed checks
      description: |-
        Displays a summary of all checks that were performed by Spectra Assure for the requested package version. This includes software analysis, diff checks (comparison against another package version) and reproducible build checks (comparison of the main package version artifact against a reproducible build artifact).

        The response is aligned with the **rl-checks** [report format schema](https://docs.secure.software/cli/rl-checks-schema).
      tags:
        - Version
      x-codeSamples:
        - lang: bash
          label: 'Shell'
          source:
            $ref: './code-samples/curl/getVersionChecks'
        - lang: python
          label: 'Python - Requests'
          source:
            $ref: './code-samples/python/getVersionChecks'
        - lang: javascript
          label: 'NodeJS - Request'
          source:
            $ref: './code-samples/node/getVersionChecks'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required:
                  - analysis
                properties:
                  analysis:
                    type: object
                    required:
                      - schema
                      - timestamp
                      - version
                      - duration
                      - report
                    properties:
                      schema:
                        type: number
                        example: 2
                        description: Version of the report schema. Version number is incremented to indicate a break of backwards compatibility.
                      timestamp:
                        type: string
                        format: date-time
                        example: '2024-03-25T10:07:27Z'
                        description: Indicates when the software package was last analyzed in ISO-8601 time format.
                      version:
                        type: string
                        example: 5.0.0.0
                        description: Version of the analysis engine that was used to inspect the software package.
                      duration:
                        type: string
                        example: '00:07:49.859'
                        description: Indicates how long it took to complete the analysis step.
                      report:
                        $ref: '#/components/schemas/ChecksReport'
        '202':
          $ref: '#/components/responses/NoAnalysis'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NoReport'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/ServerError'
  /report/{organization}/{group}/{report_type}/pkg:rl/{project}/{package}@{version}:
    parameters:
      - $ref: "#/components/parameters/organization"
      - $ref: "#/components/parameters/group"
      - $ref: "#/components/parameters/project"
      - $ref: "#/components/parameters/package"
      - $ref: "#/components/parameters/version"
      - $ref: "#/components/parameters/build"
      - in: path
        name: report_type
        required: true
        schema:
          type: string
          enum:
            - cyclonedx
            - rl-checks
            - rl-cve
            - rl-diff
            - rl-json
            - rl-summary-pdf
            - rl-uri
            - sarif
            - spdx
          description: Specify the report type to export. The API returns the report contents in the response.
    get:
      operationId: getVersionReport
      summary: Export analysis report
      description: |-
        Retrieve the analysis report in the format specified with `report_type` for the specified package version. Contents of the report are returned in the response.

        By default, the endpoint returns the report for the main (representative) artifact in the package version. To get the report for a reproducible build artifact, use the `build` query parameter set to the `repro` value.

        If a reproducible build artifact does not exist for the requested package version, the API returns a 400 error response.

        With this endpoint, you can get the following report formats:

        - [CycloneDX](https://cyclonedx.org/specification/overview/)
        - [rl-checks](https://docs.secure.software/cli/rl-checks-schema)
        - [rl-cve](https://docs.secure.software/cli/rl-cve-schema)
        - [rl-diff](https://docs.secure.software/cli/rl-diff-schema)
        - [rl-json](https://docs.secure.software/cli/rl-json-schema)
        - [rl-summary-pdf](https://docs.secure.software/safe/report/report-summary)
        - [rl-uri](https://docs.secure.software/cli/rl-uri-schema)
        - [SARIF](https://docs.oasis-open.org/sarif/sarif/v2.0/sarif-v2.0.html)
        - [SPDX](https://spdx.dev/specifications/)

        Only one report can be retrieved per request.

        To get the full SAFE report for the package version, use the [Download RL-SAFE archive](https://docs.secure.software/api-reference/#tag/Version/operation/getRlSafeVersionArchive) endpoint.
      tags:
        - Version
      x-codeSamples:
        - lang: bash
          label: 'Shell'
          source:
            $ref: './code-samples/curl/getVersionReport'
        - lang: python
          label: 'Python - Requests'
          source:
            $ref: './code-samples/python/getVersionReport'
        - lang: javascript
          label: 'NodeJS - Request'
          source:
            $ref: './code-samples/node/getVersionReport'

      responses:
        '200':
          description: OK
          content:
            text/csv:
              schema:
                type: string
              example: Contents of the report file in CSV format
            application/json:
              schema:
                type: object
              example: Contents of the report file in JSON format
            application/octet-stream:
              schema:
                type: string
                format: binary
              example: The report summary in PDF format
          headers:
            Content-Disposition:
              schema:
                type: string
              description: "The default file name is different for each report format. All report file names are listed in the [supported report formats](https://docs.secure.software/concepts/analysis-reports#supported-report-formats) table."
              example: attachment; filename='report.type.json'
        '202':
          $ref: '#/components/responses/NoAnalysis'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NoReport'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/ServerError'

  /pack/safe/{organization}/{group}/pkg:rl/{project}/{package}@{version}:
    parameters:
      - $ref: "#/components/parameters/organization"
      - $ref: "#/components/parameters/group"
      - $ref: "#/components/parameters/project"
      - $ref: "#/components/parameters/package"
      - $ref: "#/components/parameters/version"
      - $ref: "#/components/parameters/build"
    get:
      operationId: getRlSafeVersionArchive
      summary: Export RL-SAFE archive
      description: |-
        Generate the RL-SAFE archive download link for the specified package version. The RL-SAFE archive contains the full SAFE report and all other supported report formats for a software package. To open the archive and work with it, you need the [SAFE Viewer](https://docs.secure.software/safe-viewer) - a free, cross-platform tool developed by ReversingLabs.

        **The RL-SAFE archive is the only way to download the complete SAFE report from the Portal for offline viewing and sharing.** Read more about [the RL-SAFE archive](https://docs.secure.software/concepts/analysis-reports#rl-safe-archive) to understand its contents and purpose.

        The response includes the `download_link` field. That is the URL from which you can download the RL-SAFE archive. The URL is valid until the time specified in the `expiration_timestamp` response field. When the URL expires, you have to send a new request to this endpoint to get the URL again.

        By default, the endpoint returns the download link for the RL-SAFE archive of the main (representative) artifact in the package version. To download the archive of a reproducible build artifact, use the `build` query parameter set to the `repro` value. If a reproducible build artifact does not exist for the requested package version, the API returns a 400 error response.
      tags:
        - Version
      x-codeSamples:
        - lang: bash
          label: 'Shell'
          source:
            $ref: './code-samples/curl/getArchive'
        - lang: python
          label: 'Python - Requests'
          source:
            $ref: './code-samples/python/getArchive'
        - lang: javascript
          label: 'NodeJS - Request'
          source:
            $ref: './code-samples/node/getArchive'
      responses:
        "200":
          description: OK
          content:
            application/json:
                schema:
                  type: object
                  required:
                    - download_link
                    - file_name
                    - expiration_timestamp
                  properties:
                    download_link:
                      type: string
                      description: "The URL from which you can download the RL-SAFE archive for the requested package version. The URL is valid until the date and time specified in the `expiration_timestamp` field."
                      example: "http://cloud.storage.url/example/your-report.rl-safe"
                    file_name:
                      type: string
                      description: "Name of the RL-SAFE archive file that will be downloaded from the URL specified in the `download_link` field."
                      example: "report.rl-safe"
                    expiration_timestamp:
                      type: string
                      description: "The date and time when the download URL for the RL-SAFE archive expires."
                      example: 2024-11-26T06:48:39.412093+00:00
        '202':
          $ref: '#/components/responses/NoAnalysis'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NoReport'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/ServerError'

