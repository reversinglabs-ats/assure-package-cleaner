      description: "Display basic information about a package that was previously created in a project in the Portal, along with all versions associated with the package."
      tags:
        - Package
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required:
                  - name
                  - name_id
                  - description
                  - versions
                properties:
                  name:
                    type: string
                    description: "Package name as created and displayed in the Portal."
                    example: ZoomInstaller
                  name_id:
                    $ref: '#/components/schemas/UUID'
                  description:
                    type: string
                    description: "Optional brief description to associate with the package."
                    example: Windows packages for Zoom
                  versions:
                    type: array
                    description: "List of all versions of the requested package."
                    items:
                      type: object
                      properties:
                        version:
                          type: string
                          description: "Package version name as created and displayed in the Portal."
                          example: "5.12"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/ServerError'
  /approve/{organization}/{group}/pkg:rl/{project}/{package}@{version}:
    parameters:
      - $ref: "#/components/parameters/organization"
      - $ref: "#/components/parameters/group"
      - $ref: "#/components/parameters/project"
      - $ref: "#/components/parameters/package"
      - $ref: "#/components/parameters/version"
    put:
      operationId: approveVersion
      summary: Approve a version
      description: |-
        Set the approval status for the requested package version to **Approved**. The request will be successful only if the package version currently has one of the following approval statuses: *Approval Pending*, *Rejected*. Revoked package versions cannot be approved again.

        Your user account must have one of the following roles to be able to approve package versions: Organization Administrator, Organization Security, Group Owner.

        For auditing purposes, you can optionally specify the reason for approving the package version in the request body.

        By default, all package versions uploaded to the Portal have the *Approval Pending* status.
      tags:
        - Version
        - Approval
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TPRMReason"
            examples:
              ApprovalReason:
                value:
                  reason: No failing policy checks identified during analysis
      responses:
        '200':
          description: Approved
          content:
            text/plain:
              example: 'Approved'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Error"
              examples:
                IncorrectApprovalStatus:
                  value:
                    error: Only a version with the 'Undetermined' and 'Rejected' approval statuses can be approved
                NoOrganization:
                  value:
                    error: Organization with provided reference does not exist
                NoGroup:
                  value:
                    error: Group with provided reference does not exist
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/ServerError'

  /reject/{organization}/{group}/pkg:rl/{project}/{package}@{version}:
    parameters:
      - $ref: "#/components/parameters/organization"
      - $ref: "#/components/parameters/group"
      - $ref: "#/components/parameters/project"
      - $ref: "#/components/parameters/package"
      - $ref: "#/components/parameters/version"
    put:
      operationId: rejectVersion
      summary: Reject a version
      description: |-
        Set the approval status for the requested package version to **Rejected**. The request will be successful only if the package version currently has the *Approval Pending* status. Revoked package versions cannot have their status changed to *Rejected*.

        For auditing purposes, you can optionally specify the reason for rejecting the package version in the request body.

        Your user account must have one of the following roles to be able to reject package versions: Organization Administrator, Organization Security, Group Owner.
      tags:
        - Version
        - Approval
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TPRMReason"
            examples:
              RejectionReason:
                value:
                  reason: Alternate software selected for approval that poses less security risk
      responses:
        '200':
          description: Rejected approval
          content:
            text/plain:
              example: 'Rejected approval'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Error"
              examples:
                IncorrectApprovalStatus:
                  value:
                    error: Only a version with the 'Undetermined' approval status can be rejected
                NoOrganization:
                  value:
                    error: Organization with provided reference does not exist
                NoGroup:
                  value:
                    error: Group with provided reference does not exist
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/ServerError'

  /revoke/{organization}/{group}/pkg:rl/{project}/{package}@{version}:
    parameters:
      - $ref: "#/components/parameters/organization"
      - $ref: "#/components/parameters/group"
      - $ref: "#/components/parameters/project"
      - $ref: "#/components/parameters/package"
      - $ref: "#/components/parameters/version"
    put:
      operationId: revokeVersion
      summary: Revoke approval
      description: |-
        Set the approval status for the requested package version to **Revoked**. The request will be successful only if the package version currently has the *Approved* status. When the approval status is set to **Revoked**, you can no longer change it back to *Approved* or *Rejected*.

        For auditing purposes, you can optionally specify the reason for revoking approval in the request body.

        Your user account must have one of the following roles to be able to revoke approval for package versions: Organization Administrator, Organization Security, Group Owner.
      tags:
        - Version
        - Approval
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TPRMReason"
            examples:
              RevokeReason:
                value:
                  reason: Fixing inadvertent or incorrect approval of software
      responses:
        '200':
          description: Revoked approval
          content:
            text/plain:
              example: 'Revoked approval'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Error"
              examples:
                IncorrectApprovalStatus:
                  value:
                    error: Only a version with the 'Approved' approval status can be revoked
                NoOrganization:
                  value:
                    error: Organization with provided reference does not exist
                NoGroup:
                  value:
                    error: Group with provided reference does not exist
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/ServerError'

  /usage/{organization}:
    parameters:
      - $ref: "#/components/parameters/organization"
    get:
      operationId: listOrganizationUsage
      summary: Usage details for an organization
      description: |-
        Return usage data for the specified organization and all groups the requesting user has the permission to access.
        In the response, groups are listed in alphabetical order.

        For an organization, next to the information tied to [analysis capacity](https://docs.secure.software/portal/analysis-capacity), there is an entire **Entitlements** section that allows you to check which [SAFE Assessment categories](https://docs.secure.software/portal/analysis-capacity#entitlements) are enabled for your ReversingLabs cloud account and are evaluated during software analysis.
        If you're using both Portal and CLI, same entitlement restrictions apply to both products.
      tags:
        - Group
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required:
                  - organization_usage
                  - groups_usage
                properties:
                  organization_usage:
                    $ref: "#/components/schemas/OrganizationUsage"
                  groups_usage:
                    type: array
                    items:
                      type: object
                      required:
                        - name
                        - projects_usage_bytes
                        - projects_usage_limit_bytes
                        - filestream_usage_bytes
                        - filestream_usage_limit_bytes
                      properties:
                        name:
                          description: "Group name as created and displayed in the Portal."
                          type: string
                          example: "My group"
                        projects_usage_bytes:
                          $ref: "#/components/schemas/ProjectUsageBytes"
                        projects_usage_limit_bytes:
                          $ref: "#/components/schemas/ProjectUsageLimitBytes"
                        filestream_usage_bytes:
                          $ref: "#/components/schemas/FilestreamUsageBytes"
                        filestream_usage_limit_bytes:
                          $ref: "#/components/schemas/FilestreamUsageLimitBytes"
                  cli_usage:
                    type: object
                    description: Detailed breakdown of CLI usage, separated into the global shared pool and specific site key allocations.
                    required:
                      - shared_pool
                      - site_keys
                    properties:
                      shared_pool:
                        type: object
                        description: The unassigned capacity available to all CLI users who do not have a specific site key allocation.
                        required:
                          - allocation_bytes
                          - usage_bytes
                          - description
                        properties:
                          allocation_bytes:
                            type: integer
                            format: int64
                            description: Total bytes available in the shared pool, which equals to the value that remains when all site key allocations are deducted from the total capacity available for the CLI.
                            example: 53687091200
                          usage_bytes:
                            type: integer
                            format: int64
                            description: Total bytes currently consumed by shared pool users.
                            example: 2147483648
                          description:
                            type: string
                            description: A fixed label for the shared pool.
                            example: "Shared Pool"
                      site_keys:
                        type: array
                        description: List of specific site key allocations.
                        items:
                          type: object
                          required:
                            - site_key
                            - allocation_bytes
                            - usage_bytes
                            - deleted
                          properties:
                            site_key:
                              type: string
                              description: A unique identifier for the site key. Site key is associated with the [CLI license](https://docs.secure.software/cli/licensing-guide#rl-secure-site-wide), but is not tied to a specific machine. This identifier always begins with `rlcli-`.
                              example: "rlcli-0d4c691600f94dc80fba3a3ba344dd4d"
                            allocation_bytes:
                              type: integer
                              format: int64
                              description: Capacity reservation assigned to a specific site key.
                              example: 1073741824
                            usage_bytes:
                              type: integer
                              format: int64
                              description: Usage consumption by a specific site key in the current month.
                              example: 52428800
                            deleted:
                              type: boolean
                              description: Whether this allocation has been deleted. This value resets at the beginning of the next month.
                              example: false
                            description:
                              type: string
                              description: User-defined description for a specific site key.
                              example: "CI/CD Pipeline Key"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/ServerError'

  /usage/{organization}/{group}:
    parameters:
      - $ref: "#/components/parameters/organization"
      - $ref: "#/components/parameters/group"
    get:
      operationId: listGroupUsage
      summary: Usage details for a group
      description: |-
        Return usage data for the specified organization and group.

        For an organization, next to the information tied to [analysis capacity](https://docs.secure.software/portal/analysis-capacity), there is an entire **Entitlements** section that allows you to check which [SAFE Assessment categories](https://docs.secure.software/portal/analysis-capacity#entitlements) are enabled for your ReversingLabs cloud account and are evaluated during software analysis.
        If you're using both Portal and CLI, same entitlement restrictions apply to both products.

        If the user account does not have permission to access the specified group, the endpoint responds with an error.
      tags:
        - Group
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required:
                  - organization_usage
                  - group_usage
                properties:
                  organization_usage:
                    $ref: "#/components/schemas/OrganizationUsage"
                  group_usage:
                    type: object
                    required:
                      - projects_usage_bytes
                      - projects_usage_limit_bytes
                      - filestream_usage_bytes
                      - filestream_usage_limit_bytes
                    properties:
                      projects_usage_bytes:
                        $ref: "#/components/schemas/ProjectUsageBytes"
                      projects_usage_limit_bytes:
                        $ref: "#/components/schemas/ProjectUsageLimitBytes"
                      filestream_usage_bytes:
                        $ref: "#/components/schemas/FilestreamUsageBytes"
                      filestream_usage_limit_bytes:
                        $ref: "#/components/schemas/FilestreamUsageLimitBytes"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/ServerError'

  /community/find/packages:
    $ref: community-endpoints/api_supply_chain_security_v2_find_packages.yaml
  /community/report/version/pkg:{repository}/{namespace}/{package}@{version}:
    $ref: community-endpoints/api_supply_chain_security_v2_report_version.yaml
  /community/report/package/pkg:{repository}/{namespace}/{package}@{version}:
    $ref: community-endpoints/api_supply_chain_security_v2_report_package.yaml

  /profile/{organization}/import:
    parameters:
      - $ref: "#/components/parameters/organization"
    post:
      operationId: importOrganizationRlProfile
      summary: Import organization profile configuration
      description: |-
        Import settings from a JSON file and apply them to the organization profile configuration. The JSON file contents must conform to the [rl-profile configuration file schema](https://docs.secure.software/cli/rl-profile-schema).
      tags:
        - Profile
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - configuration_file
              properties:
                configuration_file:
                  type: string
                  format: binary
                replace:
                  type: boolean
                  default: true
                  description: This optional flag lets you decide how the imported configuration is applied. If true, the existing configuration is fully replaced by the imported configuration. If false, the imported configuration is merged into the existing configuration (only provided overrides are updated; others remain unchanged).
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'
        "429":
          $ref: '#/components/responses/TooManyRequests'
        "500":
          $ref: '#/components/responses/ServerError'

  /profile/{organization_name}/export:
    parameters:
      - $ref: "#/components/parameters/organization"
    get:
      operationId: exportOrganizationRlProfile
      summary: Export organization profile configuration
      description: |-
        Download the current organization profile configuration as a JSON file (the `rl-profile` configuration file).
      tags:
        - Profile
      responses:
        "200":
          description: Organization profile configuration JSON file.
          headers:
            Content-Disposition:
              schema:
                type: string
                example: attachment; filename="organization-profile.json"
          content:
            application/json:
              schema:
                type: string
                format: binary
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'
        "429":
          $ref: '#/components/responses/TooManyRequests'
        "500":
          $ref: '#/components/responses/ServerError'

  /profile/{organization_name}/{group_name}/import:
    parameters:
      - $ref: "#/components/parameters/organization"
      - $ref: "#/components/parameters/group"
    post:
      operationId: importGroupRlProfile
      summary: Import group profile configuration
      description: |-
        Import settings from a JSON file and apply them to the group profile configuration. The JSON file contents must conform to the [rl-profile configuration file schema](https://docs.secure.software/cli/rl-profile-schema).
      tags:
        - Profile
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - configuration_file
              properties:
                configuration_file:
                  type: string
                  format: binary
                replace:
                  type: boolean
                  default: true
                  description: This optional flag lets you decide how the imported configuration is applied. If true, the existing configuration is fully replaced by the imported configuration. If false, the imported configuration is merged into the existing configuration (only provided overrides are updated; others remain unchanged).
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'
        "429":
          $ref: '#/components/responses/TooManyRequests'
        "500":
          $ref: '#/components/responses/ServerError'

  /profile/{organization_name}/{group_name}/export:
    parameters:
      - $ref: "#/components/parameters/organization"
      - $ref: "#/components/parameters/group"
    get:
      operationId: exportGroupRlProfile
      summary: Export group profile configuration
      description: |-
        Download the current group profile configuration as a JSON file (the `rl-profile` configuration file).
      tags:
        - Profile
      responses:
        "200":
          description: Group profile configuration JSON file.
          headers:
            Content-Disposition:
              schema:
                type: string
                example: attachment; filename="group-profile.json"
          content:
            application/json:
              schema:
                type: string
                format: binary
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'
        "429":
          $ref: '#/components/responses/TooManyRequests'
        "500":
          $ref: '#/components/responses/ServerError'

components:
  schemas:
    TPRMReason:
      type: object
      required:
        - reason
      properties:
        reason:
          description: User-specified reason for changing the approval status for the package version
          type: string
    OrganizationUsage:
      type: object
      required:
        - time_to_capacity_reset_seconds
        - max_packages
        - package_count
        - total_capacity_bytes
        - total_capacity_bytes_portal
        - this_month_used_bytes_portal
        - total_capacity_bytes_cli
        - this_month_used_bytes_cli
        - download_capacity_bytes
        - downloaded_this_month_bytes
        - promo_capacity_bytes
        - entitlements
      properties:
        time_to_capacity_reset_seconds:
          description: "Number of seconds until analysis capacity resets."
          type: integer
          example: 259200
        max_packages:
          description: "Maximum number of packages the organization can have."
          type: integer
          example: 10000
        package_count:
          description: "Number of packages in the organization."
          type: integer
          example: 1000
        total_capacity_bytes:
          description: "Analysis capacity for the organization (Portal + CLI + Flex)."
          type: integer
          example: 1181116006400
        total_capacity_bytes_portal:
          description: "Portal capacity bytes in the organization without Flex."
          type: integer
          example: 536870912000
        this_month_used_bytes_portal:
          description: "Total used bytes in the Portal in the organization in the current billing period."
          type: integer
          example: 40000000000
        total_capacity_bytes_cli:
          description: "CLI capacity bytes in the organization without Flex."
          type: integer
          example: 536870912000
        this_month_used_bytes_cli:
          description: "Total used bytes by CLI in the organization in the current billing period."
          type: integer
          example: 53687091200
        download_capacity_bytes:
          description: "Portal download capacity bytes."
          type: integer
          example: 30000000000
        downloaded_this_month_bytes:
          description: "Total downloaded bytes in the organization in the current billing period."
          type: integer
          example: 25000000000
        promo_capacity_bytes:
          description: "Total Flex capacity bytes in the organization in the current billing period."
          type: integer
          example: 1073741824000
        entitlements:
          description: "SAFE Assessment Entitlements"
          type: object
          required:
            - hardening
            - licenses
            - malware
            - secrets
            - tampering
            - vulnerabilities
          properties:
            hardening:
              $ref: '#/components/schemas/Entitlement'
            licenses:
              $ref: '#/components/schemas/Entitlement'
            malware:
              $ref: '#/components/schemas/Entitlement'
            secrets:
              $ref: '#/components/schemas/Entitlement'
            tampering:
              $ref: '#/components/schemas/Entitlement'
            vulnerabilities:
              $ref: '#/components/schemas/Entitlement'
    ProjectUsageBytes:
      type: integer
      description: "Analysis capacity used by all projects in the group, displayed in bytes."
      example: 40000000000
    ProjectUsageLimitBytes:
      type: integer
      nullable: true
      description: "If any optional limits are configured for projects in the group, displays how much of the limit has been used in bytes."
      example: 200000
    FilestreamUsageBytes:
      type: integer
      description: "Analysis capacity used by filestream in the group, displayed in bytes."
      example: 40000000000
    FilestreamUsageLimitBytes:
      type: integer
      nullable: true
      description: "If any optional limits are configured for filestream in the group, displays how much of the limit has been used in bytes."
      example: 200000
    Violations:
      type: array
      description: Lists policy violations that triggered the risk.
      example: ["SQ30107","SQ30108","SQ30110"]
      items:
        type: string
    VersionMetadataProduct:
      type: string
      example: Example application
      maxLength: 200
      description: Software product name
    VersionMetadataPublisher:
      type: string
      example: Example software publisher
      maxLength: 200
      description: Software publisher
    Hashes:
      description: Hashes calculated for the analyzed software package (md5, sha1 and sha256).
      type: array
      items:
        type: array
        maxItems: 2
        minItems: 2
        items:
          type: string
        example:
          - md5
          - ff0fd1e7a5df8a22d0c921ebe7b1b793
      example:
        - - md5
          - ff0fd1e7a5df8a22d0c921ebe7b1b793
        - - sha1
          - d63932d669fe6da664b4183d8e1d5a33a9492b9f
        - - sha256
          - 4430b43199a020b9a1f3bcfa9c55fcc207aea79ec4731def885e89980b8fe880
    AnalysisReportInfo:
      description: General software package information.
      type: object
      required:
        - file
        - statistics
        - portal
      properties:
        file:
          description: Basic software package analysis information.
          type: object
          required:
            - hashes
          properties:
            hashes:
              $ref: '#/components/schemas/Hashes'
        statistics:
          $ref: '#/components/schemas/Statistics'
        portal:
          description: "Information about the Portal instance where the API request was performed."
          type: object
          required:
            - instance
            - reference
          properties:
            instance:
              description: "Name of the Portal instance. In most cases, this name is part of the Portal URL (a subdirectory of `my.secure.software`). For example, if your Portal URL is `my.secure.software/demo`, the instance name is `demo`."
              type: string
              example: "playground"
            reference:
              description: "[Path to the report](https://docs.secure.software/portal/shareable-reports#report-sharing) for the analyzed software package in the Portal. This information cuts down the time needed to find the report in the Portal UI. To directly access the report, append the path to your Portal URL."
              type: string
              example: "reports/group/57f70f86-71ea-43f8-b443-515d911c8d4a/report/example-project/example-package/v1/?build=version"
            download:
              description: "If the `download` parameter is used in the request, this field is included in the response. It contains a short-lived link where you can download the main version artifact or the reproducible build artifact (depending on what you specified in the request with the `build` parameter). The link is valid for 60 seconds. Even if the artifact is not downloaded from the link, the Portal Download Capacity is reduced by the artifact's file size."
              type: string
              example: "http://cloud.storage.url/company-slug/25ef1aa9-8909/file-843631Z.tar.gz"
    AnalysisReportMetadata:
      description: Collection of metadata properties for the analyzed software package.
      type: object
      required:
        - assessments
      properties:
        assessments:
          $ref: '#/components/schemas/Assessments'
    AnalysisReport:
      description: Summary of the analysis report for the software package version.
      nullable: true
      type: object
      required:
        - info
        - metadata
      properties:
        info:
          $ref: '#/components/schemas/AnalysisReportInfo'
        metadata:
          $ref: '#/components/schemas/AnalysisReportMetadata'
    Entitlement:
      type: boolean
      description: Indicates whether the SAFE assessment category is evaluated during software analysis.
      enum:
        - true
        - false
      example: true
    Assessments:
      description: Information displayed in the SAFE assessment card.
      type: object
      required:
        - licenses
        - malware
        - hardening
        - secrets
        - tampering
        - vulnerabilities
      properties:
        licenses:
          $ref: '#/components/schemas/Assessment'
        malware:
          $ref: '#/components/schemas/Assessment'
        hardening:
          $ref: '#/components/schemas/Assessment'
        secrets:
          $ref: '#/components/schemas/Assessment'
        tampering:
          $ref: '#/components/schemas/Assessment'
        vulnerabilities:
          $ref: '#/components/schemas/Assessment'
    Assessment:
      allOf:
        - $ref: '#/components/schemas/Evaluation'
        - type: object
          properties:
            final:
              type: boolean
              description: "Set to true for the SAFE assessment category with the highest deployment risk."
            evaluations:
              type: array
              items:
                $ref: "#/components/schemas/Evaluation"
    Evaluation:
      type: object
      description: "SAFE assessment evaluation."
      properties:
        count:
          type: integer
          example: 17
          description: Indicates how many instances of the specific risk type have been detected in the software package version.
        label:
          type: string
          description: Indicates the risk type.
        priority:
          type: integer
          description: Issue priority assigned to the highest-risk policy violation for the risk type. 0 is P0 (highest) while 4 is P4 (lowest).
          enum: [0,1,2,3,4]
          example: 3
        status:
          $ref: '#/components/schemas/PassFailWarningStatus'
        violations:
          type: array
          description: Policy violations that triggered the risk.
          items:
            type: string
            example: "SQ20119"
    PassFailWarningStatus:
      type: string
      description: Indicates the status for the assessment category.
      enum:
        - pass
        - fail
        - warning
    PassFailStatus:
      description: Final release status for the analyzed software. Recommendation for the CI/CD process.
      type: string
      enum:
        - pass
        - fail
    ChecksReport:
      description: Summary of checks performed by Spectra Assure during analysis.
      nullable: true
      type: object
      required:
        - info
        - scans
      properties:
        info:
          $ref: '#/components/schemas/ChecksReportInfo'
        scans:
          $ref: '#/components/schemas/ChecksReportScans'
    ChecksReportInfo:
      description: General information about checks.
      type: object
      required:
        - summary
        - properties
      properties:
        summary:
          description: Summary of all completed analysis checks.
          type: object
          required:
            - scan_status
            - scan_label
            - reproducible
            - pass_checks
            - fail_checks
          properties:
            scan_status:
              type: string
              enum:
                - pass
                - fail
                - warning
              example: fail
              description: Final scan status of the analyzed software package based on all performed checks.
            scan_label:
              type: string
              example: RB:FAIL
              description: Textual indicator displayed in Spectra Assure products to show the final scan status of the analyzed software package.
            reproducible:
              type: string
              example: repro-check-fail
              description: Status of the reproducible builds check (if performed).
              enum:
                - repro-not-checked
                - repro-check-pass
                - repro-check-fail
            pass_checks:
              type: integer
              example: 2
              description: Total number of passing checks.
            fail_checks:
              type: integer
              example: 2
              description: Total number of failing checks.
        properties:
          description: 'Reserved: An array of key-value properties (unused).'
          example: []
          items:
            type: string
          type: array
    ChecksReportScans:
      description: Details about each of the checks performed by Spectra Assure during analysis. The `scan-version` object contains details about checks on the main package version artifact. The `scan-repro` object contains details about checks on the reproducible build artifact (if any).
      type: object
      properties:
        scan-repro:
          allOf:
            - $ref: '#/components/schemas/ChecksReportScanDetail'
            - description: Details about checks performed on the reproducible build artifact.
        scan-version:
          allOf:
            - $ref: '#/components/schemas/ChecksReportScanDetail'
            - description: Details about checks performed on the main package version artifact.
    ChecksReportScanDetail:
      type: object
      properties:
        artifact:
          $ref: '#/components/schemas/Artifact'
        assessments:
          description: Information displayed in the SAFE assessment card.
          type: object
          required:
            - licenses
            - malware
            - hardening
            - secrets
            - tampering
            - vulnerabilities
          properties:
            licenses:
              allOf:
                - $ref: '#/components/schemas/Assessment'
                - properties:
                    violations:
                      $ref: '#/components/schemas/Violations'
            malware:
              allOf:
                - $ref: '#/components/schemas/Assessment'
                - properties:
                    violations:
                      $ref: '#/components/schemas/Violations'
            hardening:
              allOf:
                - $ref: '#/components/schemas/Assessment'
                - properties:
                    violations:
                      $ref: '#/components/schemas/Violations'
            secrets:
              allOf:
                - $ref: '#/components/schemas/Assessment'
                - properties:
                    violations:
                      $ref: '#/components/schemas/Violations'
            tampering:
              allOf:
                - $ref: '#/components/schemas/Assessment'
                - properties:
                    violations:
                      $ref: '#/components/schemas/Violations'
            vulnerabilities:
              allOf:
                - $ref: '#/components/schemas/Assessment'
                - properties:
                    violations:
                      $ref: '#/components/schemas/Violations'
        checks:
          type: array
          description: Summary of all check types performed during analysis.
          items:
            $ref: '#/components/schemas/Check'
        final:
          type: boolean
          example: true
          description: Indicates if this scan causes the overall analysis status.
        inhibitors:
          $ref: '#/components/schemas/Inhibitors'
        statistics:
          $ref: '#/components/schemas/Statistics'
    Artifact:
      description: Basic information for the artifact that was scanned (the main package version artifact or the reproducible build artifact).
      type: object
      properties:
        classification:
          $ref: '#/components/schemas/Classification'
        format:
          description: 'File format of the analyzed software as identified by the Spectra Assure engine. Typically displayed as: *type/subtype/format:version*'
          type: string
          example: GZIP
        hashes:
          $ref: '#/components/schemas/Hashes'
        name:
          description: File name of the analyzed software.
          type: string
          example: my_file
        path:
          description: Location of the analyzed software component within the software package.
          type: string
          example: ''
        size:
          description: File size on disk of the analyzed software in bytes.
          type: number
          example: 210812
        subtype:
          description: 'File subtype as identified by the Spectra Assure engine. Typically displayed as: *type/subtype/format:version*'
          type: string
          example: Archive
        type:
          description: 'File type as identified by the Spectra Assure engine. Typically displayed as: *type/subtype/format:version*'
          type: string
          example: Binary
        version:
          description: 'Version string for the analyzed software. Typically displayed as: *type/subtype/format:version*. Version can be omitted for **Generic** values.'
          type: string
          example: Generic
    Classification:
      description: Classification of the analyzed software package unit.
      properties:
        result:
          description: Resulting classification represented as a detection string conforming to the ReversingLabs Malware Naming Standard.
          example: ''
          type: string
        status:
          description: Threat detection status of the analyzed software package as a standalone unit of code. Any file classified as a threat will have the classification status set to either **Malicious** or **Suspicious**.
          enum:
            - Goodware
            - Suspicious
            - Malicious
            - Unknown
          example: Malicious
          type: string
      type: object
    Check:
      type: object
      description: Details about each check type.
      properties:
        final:
          type: boolean
          example: true
          description: Indicates if this check causes the overall scan status.
        label:
          description: Textual indicator displayed in Spectra Assure products to show the status of this check. The first two characters in the label indicate the check type. `LX` is used for software analysis with SAFE Levels enabled. `CI` is used for software analysis with SAFE Levels disabled. `RB` is used for reproducible build checks. `DF` is used for diffs.
          type: string
          example: L5:FAIL
        reference:
          description: Reference version used for diffing.
          type: string
          example: ab0f2461-58a9-49ea-99ee-042487921e43
        status:
          description: Indicates the status for this type of check.
          type: string
          example: fail
        type:
          description: Indicates the type of check. Software analysis is represented by `artifact-check`. Reproducible build check is represented by `repro-check`. Diff between two package versions is represented by `artifact-diff`.
          enum:
            - artifact-check
            - artifact-diff
            - repro-check
          type: string
          example: artifact-check
    Inhibitors:
      description: Provides the details for scans performed using **SAFE Levels**.
      properties:
        customized:
          description: Indicates whether the scanning level has been customized by relaxing attainment requirements.
          example: false
          type: boolean
        exclusions:
          description: List of level attainment policies that have been disabled by configuration.
          example:
            SQ31102: 4
          type: object
        next_level:
          description: Next **SAFE Level** the application can attain without failing the build.
          example: 5
          type: integer
        scan_level:
          description: Configured scan **SAFE Level**, used to perform the software package analysis.
          example: 3
          type: integer
      type: object
    Statistics:
      type: object
      description: Overall analysis statistics and quality.
      properties:
        components:
          description: Number of software components detected in the analyzed package.
          example: 9
          type: integer
        extracted:
          description: Number of files extracted from the analyzed software package.
          example: 363
          type: integer
        bad_checksum:
          type: integer
          description: Number of file integrity errors.
          example: 0
        bad_format:
          type: integer
          description: Number of file unpacking errors.
          example: 0
        bad_password:
          type: integer
          description: Number of password-protected files with an unknown password.
          example: 0
        unsupported:
          type: integer
          description: Number of files whose unpacking is not supported due to their [formats](https://docs.secure.software/concepts/filetypes#unsupported).
          example: 0
        quality:
          allOf:
            - $ref: '#/components/schemas/Quality'
            - properties:
                issues:
                  type: object
                  description: Software quality violations per severity level.
                  properties:
                    fail:
                      description: Number of triggered policies with a "fail" status.
                      type: integer
                      example: 5
                    high:
                      description: Number of triggered high severity policies.
                      type: integer
                      example: 8
                    low:
                      description: Number of triggered low severity policies.
                      type: integer
                      example: 0
                    medium:
                      description: Number of triggered medium severity policies.
                      type: integer
                      example: 3
                    pass:
                      description: Number of triggered policies with a "pass" status.
                      type: integer
                      example: 34
                    total:
                      description: The total number of violations per policy. Corresponds to the number of policies triggered for each category.
                      type: integer
                      example: 11
                    warning:
                      description: Number of triggered policies that were overriden by user to "pass".
                      type: integer
                      example: 0
        vulnerabilities:
          allOf:
            - $ref: '#/components/schemas/Vulnerabilities'
            - properties:
                exploit:
                  description: Number of vulnerabilities detected in the analyzed software that have known existing exploits. Does not contribute to total count.
                  example: 6
                  type: integer
                fixable:
                  description: Number of vulnerabilities detected in the analyzed software for which a fix is available and can be applied. Does not contribute to total count.
                  example: 4
                  type: integer
        licenses:
          $ref: '#/components/schemas/Licenses'
    Licenses:
      type: object
      description: Number of software licenses detected in the analyzed software. Statistics are grouped by license category.
      properties:
        copyleft:
          description: Number of files with a copyleft license.
          example: 4
          type: integer
        freemium:
          description: Number of files with a freemium license.
          example: 0
          type: integer
        freeware:
          description: Number of files with a freeware license.
          example: 1
          type: integer
        non-commercial:
          description: Number of files with a non-commercial license.
          example: 0
          type: integer
        permissive:
          description: Number of files with a permissive license.
          example: 7
          type: integer
        proprietary:
          description: Number of files with a proprietary license.
          example: 1
          type: integer
        public_domain:
          description: Number of files with a public license.
          example: 1
          type: integer
        shareware:
          description: Number of files with a shareware license.
          example: 0
          type: integer
        undeclared:
          description: Number of components or dependencies whose license is unknown.
          example: 0
          type: integer
        weak_copyleft:
          description: Number of files with a weak copyleft license.
          example: 3
          type: integer
    Quality:
      type: object
      description: Software package issue statistics.
      properties:
        metrics:
          allOf:
            - $ref: '#/components/schemas/Metrics'
            - properties:
                fail:
                  description: Number of files or components that triggered a failing policy.
                  type: integer
                  example: 5
                pass:
                  description: Number of files or components with the "pass" status.
                  type: integer
                  example: 34
                warning:
                  description: Number of files or components that triggered a policy that was overriden by user to "pass".
                  type: integer
                  example: 0
        priority:
          description: Highest priority issue in the analyzed package.
          example: 0
          type: integer
        status:
          description: CI/CD status recommendation.
          example: fail
          type: string
    Metrics:
      type: object
      description: Software quality metrics per severity level.
      properties:
        high:
          description: Number of files or components with high severity issues.
          type: integer
          example: 8
        low:
          description: Number of files or components with low severity issues.
          type: integer
          example: 0
        medium:
          description: Number of files or components with medium severity issues.
          type: integer
          example: 3
        total:
          description: The total number of violations per file or component. Corresponds to the number of files or components with detected policy violations.
          type: integer
          example: 11
    Vulnerabilities:
      type: object
      description: Number of vulnerabilities detected in the analyzed software. Statistics are grouped by vulnerability severity and type, and as total count of all vulnerabilities found.
      properties:
        critical:
          description: Number of critical severity vulnerabilities detected in the analyzed software.
          example: 0
          type: integer
        high:
          description: Number of high severity vulnerabilities detected in the analyzed software.
          example: 4
          type: integer
        low:
          description: Number of low severity vulnerabilities detected in the analyzed software.
          example: 0
          type: integer
        malware:
          description: Number of vulnerabilities detected in the analyzed software that are actively exploited by malware. Does not contribute to total count.
          example: 0
          type: integer
        mandate:
          description: Number of patch-mandated vulnerabilities detected in the analyzed software. Does not contribute to total count.
          example: 0
          type: integer
        medium:
          description: Number of medium severity vulnerabilities detected in the analyzed software.
          example: 0
          type: integer
        named:
          description: Number of vulnerabilities with named CVE aliases found in the analyzed software. Does not contribute to total count.
          example: 0
          type: integer
        total:
          description: Total number of vulnerabilities detected in the analyzed software.
          example: 7
          type: integer
        triaged:
          description: Number of vulnerabilities triaged as not affecting the analyzed software.
          example: 3
          type: integer
    SoftwareCategory:
      description: Categorization scheme for software based on their typical use or general purpose.
      type: string
      enum:
