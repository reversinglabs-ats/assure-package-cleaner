    SoftwarePlatform:
      description: Underlying technology or framework that the software has been developed to run on.
      type: string
      enum:
        - Other
        - Windows
        - Linux
        - MacOS
        - Containers
        - Browser
        - Mobile
    UUID:
      type: string
      description: "Automatically generated unique identifier."
      format: uuid
      example: "593ea5fd-a588-4790-bb60-ce5648d19a83"
    Date:
      type: string
      format: date
      example: '2025-01-20'
    DateTime:
      type: string
      format: date-time
      example: '2022-07-15T13:57:39.843631Z'
    Messages:
      type: object
      required:
        - message
      properties:
        message:
          type: string
    Error:
      type: object
      required:
        - error
      properties:
        error:
          type: string
    SoftwareInfo:
      type: object
      required:
        - product
        - version
        - publisher
        - category
        - license
        - platform
        - release_date
      properties:
        product:
          type: string
          nullable: true
          example: Inno Setup
        version:
          type: string
          example: 5.5.8
        publisher:
          type: string
          nullable: true
          example: jrsoftware.org
          default: Unknown
        category:
          type: string
          example: Other
          default: Other
        license:
          type: string
          example: Unknown
          default: Unknown
        platform:
          type: string
          example: Windows
          default: Other
        release_date:
          allOf:
            - $ref: "#/components/schemas/DateTime"
            - nullable: true
    ApprovalStatusDisplay:
      type: string
      description: "Approval status for the requested package version."
      enum:
        - Undetermined
        - Approved
        - ApprovalRejected
        - ApprovalRevoked
    OrganizationRole:
      type: string
      enum:
        - RlSupport
        - OrganizationAdmin
        - OrganizationMember
        - Security
        - TrialOrganizationMember
      example: OrganizationMember
      default: OrganizationMember
    GroupRole:
      type: string
      enum:
        - GroupOwner
        - GroupMember
        - TrialGroupMember
      example: GroupOwner
      default: GroupMember
    ApprovalStatusInformation:
      type: object
      required:
        - reason
        - user
        - role
        - timestamp
      properties:
        reason:
          description: "Reason for the current approval status of the requested package version. This information is provided for auditing purposes."
          type: string
          example: Rejected because of valid reasons
        timestamp:
          $ref: "#/components/schemas/DateTime"
        user:
          description: "Name of the user who set the current approval status for the requested package version. This information is provided for auditing purposes."
          type: string
          example: user@foo.bar
          nullable: true
        role:
          oneOf:
            - $ref: '#/components/schemas/OrganizationRole'
            - $ref: '#/components/schemas/GroupRole'
          example: GroupOwner
          nullable: true
          description: "Current role of the user who set the approval status for the requested package version. This role is not necessarily the same as it was when the approval status was set."
  parameters:
    organization:
      in: path
      name: organization
      required: true
      schema:
        type: string
        example: example-organization
        description: Specify the name of a Portal organization to use in the request. The user account that is sending the request must be a member of the specified organization and have the appropriate permissions to perform the requested operation. Organization names are case-sensitive.
    group:
      in: path
      name: group
      required: true
      schema:
        type: string
        example: example-group
        description: Specify the name of a Portal group to use in the request. The group must exist in the specified Portal organization. Group names are case-sensitive.
    project:
      in: path
      name: project
      required: true
      schema:
        type: string
        example: example-project
        description: Specify the name of a Portal project to use in the request. Project names are case-sensitive. Special characters `\/:*?"<>|` are not supported.
    package:
      in: path
      name: package
      required: true
      schema:
        type: string
        example: example-package
        description: Specify the name of a Portal package to use in the request. Package names are case-sensitive. Special characters `\/:*?"<>|` are not supported.
    version:
      in: path
      name: version
      required: true
      schema:
        type: string
        example: 1.2.0
        description: Specify the name of a Portal package version to use in the request. Version names are case-sensitive. Special characters `\/:*?"<>|` are not supported.
    build:
      in: query
      name: build
      required: false
      description: This optional parameter should be used when working with reproducible builds. Specify if the request should apply to the main artifact (`version`) or to the reproducible build artifact (`repro`). Only one of the two supported values can be specified per request.
      schema:
        type: string
        enum: [repro, version]
        default: version
    download:
      in: query
      name: download
      required: false
      description: Returns a short-lived link where you can download the main version artifact or the reproducible build artifact. Use the `build` parameter in the request to specify the artifact to download. The link is valid for 60 seconds. **The link generation affects the Portal Download Capacity even if the artifact is not downloaded.**
      schema:
        type: boolean
        default: false
  securitySchemes:
    TokenAuthentication:
      type: http
      scheme: bearer

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          examples:
            NoOrganization:
              value:
                error: Organization with provided reference does not exist
            NoGroup:
              value:
                error: Group with provided reference does not exist
            UnsupportedCharacter:
              value:
                error: Resource name contains one or more of the following forbidden characters \/:*?"<>|
    Unauthorized:
      description: Not authorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          examples:
            NoToken:
              value:
                error: Authentication credentials were not provided
            WrongToken:
              value:
                error: Invalid token
    InsufficientRemainingCapacity:
      description: Insufficient remaining capacity
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          examples:
            PaymentRequired:
              value:
                error: Insufficient remaining capacity
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    TooManyRequests:
      description: Too many requests
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    ServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NoAnalysis:
      description: Accepted
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Messages'
          examples:
            VersionNotDoneWithAnalysis:
              value:
                message: Cannot get report for version that is not done with analysis
            VersionWithNoCompleteAnalysis:
              value:
                message: Cannot get report for version that does not have complete analysis
    NoReport:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          examples:
            VersionDoesntExist:
              value:
                error: Provided version doesn't exist
            VersionDoesntHaveRepro:
              value:
                error: Provided version does not have a reproducible build
