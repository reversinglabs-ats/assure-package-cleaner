name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff format check
        run: ruff format --check .

      - name: Ruff lint
        run: ruff check --no-fix .

      - name: Type check (mypy)
        run: mypy src tests

      - name: Tests (pytest)
        run: pytest

      - name: Notify ats-kb-automation
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          curl -sS -X POST \
            -H "Authorization: token ${{ secrets.GH_ORG_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/reversinglabs-ats/ats-kb-automation/dispatches \
            -d '{"event_type":"repo-updated","client_payload":{"repo":"${{ github.event.repository.name }}"}}'
